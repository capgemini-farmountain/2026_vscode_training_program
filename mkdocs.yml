site_name: AI Productivity Engineering with VS Code Copilot
site_url: https://capgemini-farmountain.github.io/2026_vscode_training_program
repo_url: https://github.com/capgemini-farmountain/2026_vscode_training_program
repo_name: capgemini-farmountain/2026_vscode_training_program
docs_dir: .

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Learning Paths:
    - Copilot Essentials (Path 1): paths/essentials.md
    - Developer AI Engineering (Path 2): paths/developer.md
    - Cowork & Automation (Path 3): paths/cowork.md
    - AI Engineering Complete (Path 4): paths/complete.md
  - Track 1 — AI Programming:
    - M0 Foundation:
      - Overview: curriculum/m0-foundation/README.md
      - Lab — The Credit Experiment: curriculum/m0-foundation/lab.md
      - Quiz: curriculum/m0-foundation/quiz.md
      - Reflection: curriculum/m0-foundation/reflection.md
    - M1 Prompt & Context:
      - Overview: curriculum/m1-prompt-context/README.md
      - Lab: curriculum/m1-prompt-context/lab.md
      - Quiz: curriculum/m1-prompt-context/quiz.md
      - Reflection: curriculum/m1-prompt-context/reflection.md
    - M2 Configuration Layer:
      - Overview: curriculum/m2-configuration/README.md
      - Lab: curriculum/m2-configuration/lab.md
      - Quiz: curriculum/m2-configuration/quiz.md
      - Reflection: curriculum/m2-configuration/reflection.md
    - M3 Harness & Loop:
      - Overview: curriculum/m3-harness-loop/README.md
      - Lab: curriculum/m3-harness-loop/lab.md
      - Quiz: curriculum/m3-harness-loop/quiz.md
      - Reflection: curriculum/m3-harness-loop/reflection.md
    - M4 Plugin Ecosystem:
      - Overview: curriculum/m4-plugin-ecosystem/README.md
      - Lab: curriculum/m4-plugin-ecosystem/lab.md
      - Quiz: curriculum/m4-plugin-ecosystem/quiz.md
      - Reflection: curriculum/m4-plugin-ecosystem/reflection.md
    - M5 Capstone:
      - Overview: curriculum/m5-capstone/README.md
      - Lab: curriculum/m5-capstone/lab.md
      - Quiz: curriculum/m5-capstone/quiz.md
      - Reflection: curriculum/m5-capstone/reflection.md
  - Track 2 — Cowork & Automation:
    - C0 Cowork Concepts:
      - Overview: curriculum/c0-cowork-concepts/README.md
      - Lab: curriculum/c0-cowork-concepts/lab.md
      - Quiz: curriculum/c0-cowork-concepts/quiz.md
      - Reflection: curriculum/c0-cowork-concepts/reflection.md
    - C1 Research Automation:
      - Overview: curriculum/c1-research-automation/README.md
      - Lab: curriculum/c1-research-automation/lab.md
      - Quiz: curriculum/c1-research-automation/quiz.md
      - Reflection: curriculum/c1-research-automation/reflection.md
    - C2 Office Automation:
      - Overview: curriculum/c2-office-automation/README.md
      - Lab: curriculum/c2-office-automation/lab.md
      - Quiz: curriculum/c2-office-automation/quiz.md
      - Reflection: curriculum/c2-office-automation/reflection.md
    - C3 Marketing & Content:
      - Overview: curriculum/c3-marketing-content/README.md
      - Lab: curriculum/c3-marketing-content/lab.md
      - Quiz: curriculum/c3-marketing-content/quiz.md
      - Reflection: curriculum/c3-marketing-content/reflection.md
    - C4 Cowork Harness:
      - Overview: curriculum/c4-cowork-harness/README.md
      - Lab: curriculum/c4-cowork-harness/lab.md
      - Quiz: curriculum/c4-cowork-harness/quiz.md
      - Reflection: curriculum/c4-cowork-harness/reflection.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
